<section class="animales">

<img src="{% static 'inicio_sesion/img/muñequitos2.png' %}">

        <!-- BOTÓN FLOTANTE MANUAL DE USUARIO -->
        <style>
            .btn-flotante-manual {
                position: absolute;
                bottom: 20px;
                right: 20px;
                width: 60px;
                height: 60px;
                background-color: #ff9800;
                color: white;
                border-radius: 50%;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 36px;
                font-family: 'Luckiest Guy', sans-serif;
                text-decoration: none;
                box-shadow: 0 4px 10px rgba(0,0,0,0.3);
                z-index: 9999;
                border: 3px solid white;
                transition: transform 0.2s, background-color 0.2s;
            }
            .btn-flotante-manual:hover {
                transform: scale(1.1);
                background-color: #f57c00;
                color: white;
            }
        </style>
        <a href="{% url 'manual_usuario' %}" class="btn-flotante-manual" title="Ver Manual de Usuario">
            ?
        </a>
    </div>

    <script>
    function getJugadorActual() {
        const cookies = document.cookie.split(';');
        for (let cookie of cookies) {
            const [name, value] = cookie.trim().split('=');
            if (name === 'jugador_actual') {
                return decodeURIComponent(value);
            }
        }
        return null;
    }

    const jugadorActual = getJugadorActual();
    if (!jugadorActual) {
        localStorage.removeItem('nombreJugadorLectosoft');
        window.location.href = '/login/';
    } else {
        localStorage.setItem('nombreJugadorLectosoft', jugadorActual);
    }

    const defaultMenuAvatar = "{% static 'inicio_sesion/img/perfil.png' %}";
    const menuAvatar = document.getElementById('menu-avatar');
    const storedName = jugadorActual || 'Lecto';
    const avatarSeed = encodeURIComponent(storedName);
    const displayName = storedName;

    if (menuAvatar) {
        menuAvatar.src = `https://api.dicebear.com/6.x/bottts/svg?seed=${avatarSeed}`;
        menuAvatar.onerror = () => { menuAvatar.src = defaultMenuAvatar; };
    }

    const greetingText = document.getElementById('greeting-text');
    if (greetingText) {
        greetingText.innerHTML = `¡HOLA ${displayName}!<br>TE<br>ESTÁBAMOS<br>ESPERANDO PARA<br>JUGAR Y APRENDER.`;
    }
</script>




<!-- SCRIPT DE AUTO-ESCALADO RESPONSIVO -->
<script>
    function aplicarEscalaResponsiva() {
        const minWidth = 1100; // Ancho base de diseño
        const screenWidth = window.innerWidth;
        
        if (screenWidth < minWidth) {
            const scale = screenWidth / minWidth;
            document.body.style.transform = `scale(${scale})`;
            document.body.style.transformOrigin = 'top left';
            document.body.style.width = `${minWidth}px`;
            document.body.style.minHeight = `${window.innerHeight / scale}px`;
            document.documentElement.style.overflowX = 'hidden';
            document.body.style.overflowX = 'hidden';
        } else {
            document.body.style.transform = 'none';
            document.body.style.width = '100%';
            document.body.style.minHeight = '100vh';
        }
    }
    window.addEventListener('resize', aplicarEscalaResponsiva);
    window.addEventListener('DOMContentLoaded', aplicarEscalaResponsiva);
    aplicarEscalaResponsiva();
</script>

</body>
</html>
